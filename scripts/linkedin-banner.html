<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Banner — Policy Canary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .instructions {
      color: #94A3B8;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }
    .instructions strong { color: #EAC100; }

    /* The banner itself */
    .banner {
      width: 1128px;
      height: 191px;
      background: #0F172A;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    /* Subtle gradient overlay for depth */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.7) 40%, rgba(15,23,42,0.3) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* The screenshot — positioned right, slightly rotated */
    .screenshot {
      position: absolute;
      right: -40px;
      top: -60px;
      width: 700px;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: perspective(1200px) rotateY(-8deg) rotateX(2deg);
      z-index: 1;
    }

    /* Left side: brand + tagline — shifted right to avoid LinkedIn logo overlay */
    .content {
      position: absolute;
      left: 280px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      max-width: 460px;
    }

    .wordmark {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #94A3B8;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .tagline {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #F1F5F9;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .tagline em {
      font-style: normal;
      color: #EAC100;
    }

    .url {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: #64748B;
      letter-spacing: 0.5px;
    }

    /* Canary accent line at top */
    .top-rule {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #EAC100;
      z-index: 4;
    }

    .size-label {
      color: #64748B;
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
  <!-- Google Fonts for IBM Plex -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="instructions">
    Right-click the banner below and <strong>Save Image</strong>, or screenshot at exactly 1128x191.<br>
    Replace <code>screenshot.png</code> below with the path to your product dashboard screenshot.
  </div>

  <div class="banner" id="banner">
    <div class="top-rule"></div>

    <!-- Replace this src with your actual screenshot path -->
    <img class="screenshot" src="dashboard-screenshot.png" alt="Product Dashboard">

    <div class="content">
      <div class="wordmark">Policy Canary</div>
      <div class="tagline">
        FDA regulatory changes matched to<br>
        <em>your ingredients, your products, your deadlines.</em>
      </div>
      <div class="url">policycanary.io</div>
    </div>
  </div>

  <div class="size-label">1128 x 191px</div>

</body>
</html>
