#cloud-config
# Policy Canary — Clawdbot (OpenClaw) VPS bootstrap
# Target: Ubuntu 24.04 on Vultr vc2-1c-2gb

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - jq
  - unzip

runcmd:
  # --- Node.js 22 LTS via NodeSource ---
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - node --version > /var/log/node-install.log

  # --- Docker (official repo) ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${VERSION_CODENAME}) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - docker --version >> /var/log/node-install.log

  # --- OpenClaw ---
  - npm install -g openclaw@latest
  - openclaw --version >> /var/log/node-install.log

  # --- Create openclaw system user ---
  - useradd -m -s /bin/bash openclaw
  - usermod -aG docker openclaw

  # --- Workspace directory structure ---
  - mkdir -p /home/openclaw/.openclaw/workspace/scripts
  - mkdir -p /home/openclaw/.openclaw/workspace/skills
  - chown -R openclaw:openclaw /home/openclaw/.openclaw

  # --- Signal setup complete ---
  - echo "cloud-init complete at $(date)" >> /var/log/node-install.log
